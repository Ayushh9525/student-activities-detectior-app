{% extends 'base.html' %}
{% block title %}Sign In — ClassWatch{% endblock %}

{% block content %}
<div class="center-page">
  <div class="card auth-card">
    <h2 class="card-title" style="text-align:center;">Welcome back</h2>
    <p class="auth-sub" style="margin-bottom:20px;">Sign in to your account</p>

    {% if error %}
    <div class="alert alert-error" id="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}" id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btn-login">Sign In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
